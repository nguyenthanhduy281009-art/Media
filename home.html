<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư viện Media</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        button { padding: 10px 15px; background: #e94560; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #d03b54; }
        input[type="file"] { padding: 8px; border: 1px solid #ddd; border-radius: 8px; }
        #status { color: #e94560; font-size: 14px; margin-left: 10px; font-weight: bold; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .media-card { position: relative; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); background: #000; cursor: grab; }
        .media-card img, .media-card video { width: 100%; height: 200px; object-fit: cover; display: block; transition: transform 0.3s; pointer-events: none; }
        .media-card:hover img { transform: scale(1.05); }
        .delete-btn { position: absolute; top: 8px; right: 8px; background: rgba(255, 0, 0, 0.8); color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; z-index: 10; display: none; }
        .media-card:hover .delete-btn { display: block; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .close-modal { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; cursor: pointer; z-index: 1010; }
        .music-list { display: none; position: absolute; right: 0; background: white; border: 1px solid #ccc; width: 250px; max-height: 300px; overflow-y: auto; z-index: 100; padding: 10px; border-radius: 8px; }
        .music-item { padding: 8px; cursor: pointer; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Thư viện của bạn</h2>
        <div style="display:flex; gap:10px;">
            <div class="music-container">
                <button onclick="toggleMusicList()">Nhạc</button>
                <div id="musicList" class="music-list"></div>
            </div>
            <button onclick="firebase.auth().signOut()">Đăng xuất</button>
        </div>
    </div>
    <div>
        <input type="file" id="fileInput" accept="image/*,video/*">
        <button onclick="uploadFile()">Tải Ảnh/Video</button>
        <input type="file" id="audioInput" accept="audio/*,video/*">
        <button onclick="uploadAudio()">Tải Nhạc (Không Hình)</button>
        <span id="status"></span>
    </div>
    <div class="gallery" id="gallery"></div>
</div>

<div id="mediaModal" class="modal">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <div id="modalViewer"></div>
</div>

<script>
    const firebaseConfig = { /* CẤU HÌNH CỦA BẠN */ };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

    let currentUser = null, mediaList = [];

    firebase.auth().onAuthStateChanged(user => {
        if (user) { currentUser = user; loadMedia(); }
    });

    // Hàm lưu dùng chung
    function saveToDatabase(file, type) {
        const reader = new FileReader();
        document.getElementById("status").innerText = "Đang tải...";
        reader.onload = () => {
            firebase.database().ref(`media/${currentUser.uid}`).push({
                url: reader.result, type: type, createdAt: Date.now()
            }).then(() => {
                document.getElementById("status").innerText = "Xong!";
                setTimeout(() => document.getElementById("status").innerText = "", 2000);
            });
        };
        reader.readAsDataURL(file);
    }

    function uploadFile() {
        const file = document.getElementById("fileInput").files[0];
        if (file) saveToDatabase(file, file.type);
    }

    function uploadAudio() {
        const file = document.getElementById("audioInput").files[0];
        // Ép kiểu type chứa 'audio' để hệ thống nhận diện là file chỉ phát tiếng
        if (file) saveToDatabase(file, "audio/custom-upload");
    }

    function loadMedia() {
        firebase.database().ref(`media/${currentUser.uid}`).on("value", snap => {
            mediaList = [];
            snap.forEach(child => mediaList.unshift({ key: child.key, ...child.val() }));
            renderGallery();
        });
    }

    function renderGallery() {
        const gallery = document.getElementById("gallery");
        gallery.innerHTML = "";
        mediaList.forEach((item, index) => {
            const div = document.createElement("div");
            div.className = "media-card";
            // Nếu là audio thì hiển thị icon nhạc
            div.innerHTML = item.type.includes("audio") ? 
                `<div style="display:flex;height:200px;align-items:center;justify-content:center;color:white;font-size:40px;">🎵</div>` :
                (item.type.includes("image") ? `<img src="${item.url}">` : `<video src="${item.url}"></video>`);
            
            div.innerHTML += `<button class="delete-btn" onclick="event.stopPropagation(); deleteFile('${item.key}')">Xóa</button>`;
            div.onclick = () => openModalAtIndex(index);
            gallery.appendChild(div);
        });
    }

    function openModalAtIndex(index) {
        const item = mediaList[index];
        const viewer = document.getElementById("modalViewer");
        // Nếu type chứa audio -> Dùng thẻ <audio> không hiện hình
        if (item.type.includes("audio")) {
            viewer.innerHTML = `<audio src="${item.url}" controls autoplay style="width:80%"></audio>`;
        } else if (item.type.includes("image")) {
            viewer.innerHTML = `<img src="${item.url}" style="max-width:90%;max-height:90%">`;
        } else {
            viewer.innerHTML = `<video src="${item.url}" controls autoplay style="max-width:90%;max-height:90%"></video>`;
        }
        document.getElementById("mediaModal").style.display = "flex";
    }

    function toggleMusicList() {
        const list = document.getElementById("musicList");
        list.style.display = list.style.display === "block" ? "none" : "block";
        list.innerHTML = "";
        mediaList.filter(i => i.type.includes("audio")).forEach((item, idx) => {
            const div = document.createElement("div");
            div.className = "music-item";
            div.innerText = "🎵 Nhạc " + (idx + 1);
            div.onclick = () => openModalAtIndex(mediaList.indexOf(item));
            list.appendChild(div);
        });
    }

    function closeModal() { document.getElementById("mediaModal").style.display = "none"; }
    async function deleteFile(key) { 
        if (confirm("Xóa nhé?")) await firebase.database().ref(`media/${currentUser.uid}/${key}`).remove(); 
    }
</script>
</body>
</html>
